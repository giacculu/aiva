version: '3.8'

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: AIVA_chromadb
    volumes:
      - ./data/chroma:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - AIVA_network

  redis:
    image: redis:7-alpine
    container_name: AIVA_redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - AIVA_network

  prometheus:
    image: prom/prometheus:latest
    container_name: AIVA_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./data/prometheus:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - AIVA_network

  grafana:
    image: grafana/grafana:latest
    container_name: AIVA_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - ./data/grafana:/var/lib/grafana
    restart: unless-stopped
    networks:
      - AIVA_network

  node_exporter:
    image: prom/node-exporter:latest
    container_name: AIVA_node_exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
    restart: unless-stopped
    networks:
      - AIVA_network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: AIVA_cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    restart: unless-stopped
    networks:
      - AIVA_network

  # Opzionale: per sviluppo locale con webhook PayPal
  ngrok:
    image: ngrok/ngrok:latest
    container_name: AIVA_ngrok
    command: http host.docker.internal:8001 --log=stdout
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    depends_on:
      - chromadb
      - redis
    networks:
      - AIVA_network
    profiles:
      - dev

networks:
  AIVA_network:
    driver: bridge